<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World!</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI' sans-serif;
            background: #0f0f1a;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        h1 { font-size: 3rem; color: #7c3aed; margin-bottom: 1rem;}
        p { font-size: 1.2rem; color: #a1a1aa; margin: 0.4rem 0; }
        .badge {
            margin-top: 2rem;
            background: #1e1e2e;
            border: 1px solid #7c3aed;
            border-radius: 8px;
            padding: 1rem 2rem;
        }
        .badge span { color: #7c3aed; font-weight: bold;}
    </style>
</head>
<body>
    <h1>Hello World!</h1>
    <p>Desafio DevOps</p>
    <div class="badge">
        <p>Stack: <span>Docker - Terraform - GitHub Actions</span></p>
        <p>Monitoramento: <span>Prometheus - cAdvisor - Grafana</span> </p>
    </div>
</body>
</html>
